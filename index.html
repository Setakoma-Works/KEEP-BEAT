// Master gain + compressor
function initAudio(ctxRef, mgRef, volRef) {
  if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = ctxRef.current;
  if (ctx.state === 'suspended') ctx.resume();
  if (!mgRef.current) {
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.setValueAtTime(-3, ctx.currentTime);
    comp.knee.setValueAtTime(10, ctx.currentTime);
    comp.ratio.setValueAtTime(10, ctx.currentTime);
    comp.attack.setValueAtTime(.001, ctx.currentTime);
    comp.release.setValueAtTime(.15, ctx.currentTime);

    mg.gain.value = volRef.current / 100;
    mg.connect(comp);

function autoCorrelate(buf, sr) {
  const N = buf.length; let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / N); if (rms < .008) return -1;
  const lo = Math.floor(sr / 3000), hi = Math.min(Math.floor(sr / 40), N >> 1);
  let bestC = 0, bestOff = -1;
  for (let off = lo; off <= hi; off++) {
    let c = 0, cnt = N - off;
    for (let i = 0; i < cnt; i++) c += buf[i] * buf[i + off];
    c /= cnt; if (c > bestC) { bestC = c; bestOff = off; }
  }
  if (bestOff < 1 || bestC < .005) return -1;
  return sr / bestOff;
}
const NOTES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
function freqToNote(f, a4) {
  if (f <= 0) return null;
  const n = 12 * Math.log2(f / a4) + 69, r = Math.round(n);
  return { name: NOTES[((r % 12) + 12) % 12], oct: (r / 12 | 0) - 1, cents: Math.round((n - r) * 100), hz: f.toFixed(1) };
}

const TRATIO = { rit:.55, rall:.45, allarg:.50, morendo:.22, accel:1.65, string:1.90, poco_rit:.80, p_accel:1.20 };
function tempoBpm(blk, beatIdx, totalBeats, eff) {
  const { tempoMode: m, bpmEnd: e, tempoShape: s } = blk;
  if (!m || m === 'fixed') return eff;
  if (m === 'rubato') return eff * (1 + (Math.random() * 2 - 1) * .08);
  const t = totalBeats > 1 ? beatIdx / (totalBeats - 1) : 0;
  const end = (e && !isNaN(+e) && +e > 0) ? +e : eff * (TRATIO[m] || 1);
  return s === 'linear' ? eff + (end - eff) * t : eff * Math.pow(end / eff, t);

    const nl=lib.filter(x=>x.name!==name).concat({name,bpm,savedAt:e.savedAt,totalMeasures:tot}).sort((a,b)=>a.name.localeCompare(b.name));
    await lsSet(IDX,nl); setLib(nl); setCurF(name); fm(`✓ "${name}" 保存完了`);
  }
  async function loadS(name){
    const d=await lsGet(sk(name)); if(!d){fm('❌ 読み込み失敗');return;}
    stopPlay(); setSeq(addIds(d.seq));
    if(d.bpm)setBpm(d.bpm); if(d.pct)setPct(d.pct); if(d.vol!=null)setVol(d.vol);
    if(d.loop!=null)setLoop(d.loop); if(d.snd)setSnd(d.snd); if(d.sub!=null)setSub(d.sub);
    setCurF(name); setSvNm(name); setShLib(false); fm(`✓ "${name}" 読み込み完了`);
  }
  async function delS(name){
    if(!confirm(`"${name}" を削除しますか？`))return;
    await lsDel(sk(name));
    const nl=lib.filter(x=>x.name!==name); await lsSet(IDX,nl); setLib(nl);
    if(curF===name) setCurF(''); fm(`🗑 "${name}" 削除`);
  }
  function fm(msg){setSvMsg(msg);setTimeout(()=>setSvMsg(''),3000);}
  function fmtDt(iso){try{return new Date(iso).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}

  // export/import
  function dl(data,name){
    const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
    a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),1000);
  }
  function expCur(){dl({type:'keepbeat-seq',ver:'2',name:curF||'sequence',bpm,pct,vol,loop,snd,sub,seq:stripId(seq),savedAt:new Date().toISOString(),totalMeasures:seq.reduce((a,b)=>a+b.reps,0)},`KEEPBEAT_${(curF||'sequence').replace(/[\s\/\\:*?"<>|]/g,'-')}.json`);fm('📤 書き出し完了');}
  async function expLib(){
    if(!lib.length){fm('⚠ ライブラリが空');return;}
    const songs=[];for(const e of lib){const d=await lsGet(sk(e.name));if(d)songs.push(d);}
    dl({type:'keepbeat-lib',ver:'2',songs,savedAt:new Date().toISOString()},`KEEPBEAT_library.json`);fm(`📚 ${songs.length}曲 書き出し完了`);
  }
  function impFile(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.type==='keepbeat-seq'||d.type==='keepbeat-sequence'){
          stopPlay();setSeq(addIds(d.seq));
          if(d.bpm)setBpm(d.bpm);if(d.pct)setPct(d.pct);if(d.vol!=null)setVol(d.vol);
          if(d.loop!=null)setLoop(d.loop);if(d.snd)setSnd(d.snd);if(d.sub!=null)setSub(d.sub);
          const nm=d.name||file.name.replace(/\.json$/i,'');setCurF(nm);setSvNm(nm);setShLib(false);fm(`✓ "${nm}" インポート完了`);
        }else if(d.type==='keepbeat-lib'||d.type==='keepbeat-library'){
          if(!d.songs||!d.songs.length){fm('⚠ 曲が見つかりません');return;}
          let cnt=0;const ne=[];
          for(const s of d.songs){if(!s||!s.seq||!s.name)continue;await lsSet(sk(s.name),s);ne.push({name:s.name,bpm:s.bpm,savedAt:s.savedAt||new Date().toISOString(),totalMeasures:s.totalMeasures||s.seq.reduce((a,b)=>a+(b.reps||1),0)});cnt++;}
          const ml=[...lib.filter(x=>!ne.find(y=>y.name===x.name)),...ne].sort((a,b)=>a.name.localeCompare(b.name));
          await lsSet(IDX,ml);setLib(ml);fm(`✓ ${cnt}曲 インポート完了`);
        }else fm('❌ 対応していないファイル形式');
      }catch(err){fm('❌ ファイル読み込み失敗');}
    };
    r.readAsText(file);e.target.value='';
  }

  // derived
  const cBlk = inCI?(seq[0]||mkBlk()):(seq[Math.min(dBlk,seq.length-1)]||seq[0]||mkBlk());
  const acc = accents(cBlk.n, cBlk.groups);
  const aBeat = inCI ? ciBt : dBeat;
  let gMeas=1; for(let i=0;i<Math.min(dBlk,seq.length);i++) gMeas+=seq[i]?.reps||0; gMeas+=dRep;
  const totM = seq.reduce((a,b)=>a+b.reps,0);
  const dCol = inCI?C.cyn:C.amb;
  const sCol = inCI?C.cyn:(play?C.amb:C.mut);
  const cTM = TMODES.find(m=>m.id===cBlk.tempoMode)||TMODES[0];
  const tC = tunNt?.cents||0;
  const mW=280, mH=44;
  const tx=c=>(c+50)/100*mW;
  const nX=tx(tC);
  const nCol=Math.abs(tC)<10?C.grn:Math.abs(tC)<25?C.amb:C.red;

  // ─── RENDER ──────────────────────────────────────────
  return html`<div style=${{fontFamily:C.mon,background:C.bg,color:C.txt,minHeight:'100vh',padding:'12px 14px',WebkitFontSmoothing:'antialiased'}}>

    <!-- HEADER -->
    <div style=${{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:6}}>
      <div>
        <div style=${{fontFamily:C.fnt,fontSize:22,fontWeight:900,color:C.amb,letterSpacing:4,textShadow:`0 0 24px ${C.ambG}`}}>KEEP-BEAT</div>
        <div style=${{fontFamily:C.cnd,fontSize:10,color:C.mut,letterSpacing:2,marginTop:1}}>
          BRASS BAND VARIABLE METER METRONOME
          ${curF?html`<span style=${{color:C.blu,marginLeft:8}}>▶ ${curF}</span>`:''}
        </div>
      </div>
      <div style=${{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
        ${svMsg?html`<span style=${{fontFamily:C.cnd,fontSize:11,color:C.grn}}>${svMsg}</span>`:''}
        <button onClick=${()=>setShTun(v=>!v)} style=${p({},shTun?{background:'#1a1a2e',color:C.pur,border:`1px solid ${C.pur}`}:{color:C.pur,border:`1px solid ${C.bdr}`})}
          >🎵 TUNER${tunOn?html`<span style=${{color:C.grn,animation:'blink 1s infinite'}}> ●</span>`:''}</button>
        <button onClick=${()=>setShLib(v=>!v)} style=${p({},shLib?{background:'#1a2a35',color:C.blu,border:`1px solid ${C.blu}`}:{color:C.blu,border:`1px solid ${C.bdr}`})}
          >☰ LIBRARY${lib.length?` (${lib.length})`:''}</button>
        <button onClick=${()=>setLoop(l=>!l)} style=${p({},loop?{background:C.amb,color:'#000',border:`1px solid ${C.amb}`}:{background:'transparent',color:C.mut})}>⟳ ${loop?'LOOP ON':'LOOP OFF'}</button>
      </div>
    </div>

    <!-- TUNER -->
    ${shTun?html`<div style=${{background:C.pan,border:`1px solid ${C.pur}50`,borderRadius:8,padding:14,marginBottom:10}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
        <span style=${{fontFamily:C.cnd,fontSize:11,color:C.pur,letterSpacing:3,fontWeight:700}}>🎵 CHROMATIC TUNER</span>
        <div style=${{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
          <span style=${{fontFamily:C.cnd,fontSize:10,color:C.mut}}>A4:</span>
          ${[440,441,442,443,444].map(v=>html`<button key=${v} onClick=${()=>setTunA4(v)} style=${p({fontSize:11,padding:'4px 8px',fontFamily:C.fnt},tunA4===v?{background:C.pur,color:'#fff',border:`1px solid ${C.pur}`}:{color:C.mut})}>${v}</button>`)}
          <button onClick=${()=>tunOn?stopTun():startTun()} style=${p({padding:'5px 12px',fontFamily:C.cnd,fontWeight:700,fontSize:11,letterSpacing:1},tunOn?{color:C.grn,border:`1px solid ${C.grn}`}:{color:C.mut})}>
            ${tunOn?'● MIC ON':'○ MIC OFF'}
          </button>
        </div>
      </div>
      ${tunEr?html`<div style=${{color:C.red,fontFamily:C.cnd,fontSize:11,marginBottom:8}}>${tunEr}</div>`:''}
      <div style=${{display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
        <div style=${{minWidth:80,textAlign:'center'}}>
          <div style=${{fontFamily:C.fnt,fontSize:52,fontWeight:900,lineHeight:1,color:tunNt?C.pur:C.mut,textShadow:tunNt?`0 0 20px ${C.pur}50`:'none',transition:'color .1s'}}>${tunNt?tunNt.name:'—'}</div>
          <div style=${{fontFamily:C.fnt,fontSize:18,color:tunNt?C.mut:'#333',marginTop:-4}}>${tunNt?tunNt.oct:''}</div>
        </div>
        <div style=${{flex:1,minWidth:180}}>
          <svg viewBox=${`0 0 ${mW} ${mH}`} style=${{width:'100%',display:'block',borderRadius:4,marginBottom:5,overflow:'visible'}}>
            <defs>
              <linearGradient id="mg" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0%" stopColor="#4a1010"/><stop offset="20%" stopColor="#4a3510"/>
                <stop offset="38%" stopColor="#153520"/><stop offset="50%" stopColor="#0d4a28"/>
                <stop offset="62%" stopColor="#153520"/><stop offset="80%" stopColor="#4a3510"/>
                <stop offset="100%" stopColor="#4a1010"/>
              </linearGradient>
            </defs>
            <rect width=${mW} height=${mH-8} fill="url(#mg)" rx="3"/>
            ${[-50,-25,-10,0,10,25,50].map(c=>html`<g key=${c}>
              <line x1=${tx(c)} y1=${mH-13} x2=${tx(c)} y2=${mH-8} stroke="#666" strokeWidth=${c===0?2:1}/>
              <text x=${tx(c)} y=${mH-1} fill="#555" fontSize="7.5" textAnchor="middle" fontFamily="monospace">${c>0?`+${c}`:c}</text>
            </g>`)}
            ${tunNt?html`
              <line x1=${nX} y1="2" x2=${nX} y2=${mH-9} stroke=${nCol} strokeWidth="2.5" strokeLinecap="round"/>
              <circle cx=${nX} cy=${mH-7} r="4.5" fill=${nCol}/>
            `:''}
          </svg>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style=${{fontFamily:C.fnt,fontSize:16,color:tunNt?nCol:C.mut,fontWeight:700}}>${tunNt?(tC>0?`+${tC}`:tC)+' ¢':'─ ¢'}</span>
            <span style=${{fontFamily:C.mon,fontSize:11,color:C.mut}}>${tunNt?`${tunNt.hz} Hz`:'─'}</span>
            <span style=${{fontFamily:C.cnd,fontSize:10,color:tunOn?C.grn:C.mut}}>${tunOn?'● LIVE':'○ MUTED'}</span>
          </div>
        </div>
      </div>
    </div>`:''}

    <!-- LIBRARY -->
    ${shLib?html`<div style=${{background:C.pan,border:`1px solid ${C.blu}40`,borderRadius:8,padding:14,marginBottom:10}}>
      <div style=${{fontFamily:C.cnd,fontSize:11,color:C.blu,letterSpacing:3,fontWeight:700,marginBottom:10}}>☰ LIBRARY</div>
      <div style=${{display:'flex',gap:6,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
        <input value=${svNm} onInput=${e=>setSvNm(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&saveS()}
          placeholder="曲名 / セクション名"
          style=${{...SEQ,flex:1,minWidth:140,padding:'7px 10px',fontSize:13,border:`1px solid ${C.blu}40`}}/>
        <button onClick=${saveS} style=${{background:C.blu,color:'#000',border:'none',borderRadius:4,padding:'7px 16px',fontFamily:C.cnd,fontWeight:700,fontSize:13,letterSpacing:1,cursor:'pointer'}}>💾 SAVE</button>
      </div>
      ${ldLib?html`<div style=${{color:C.mut,fontFamily:C.cnd,fontSize:12,textAlign:'center',padding:12}}>読み込み中…</div>`
        :lib.length===0?html`<div style=${{color:C.mut,fontFamily:C.cnd,fontSize:12,textAlign:'center',padding:12,border:`1px dashed ${C.bdr}`,borderRadius:6}}>保存データなし</div>`
        :html`<div style=${{maxHeight:200,overflowY:'auto',marginBottom:10}}>
          ${lib.map(e=>html`<div key=${e.name} className="librow" style=${{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',marginBottom:3,background:curF===e.name?'#162030':'#0f0f16',border:`1px solid ${curF===e.name?C.blu+'60':C.bdr}`,borderRadius:5}}>
            <div style=${{width:5,height:5,borderRadius:'50%',flexShrink:0,background:curF===e.name?C.blu:'#222'}}/>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontFamily:C.fnt,fontSize:11,color:curF===e.name?C.blu:C.txt,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>${e.name}</div>
              <div style=${{fontFamily:C.cnd,fontSize:10,color:C.mut,marginTop:1}}>♩=${e.bpm} · ${e.totalMeasures}小節 · ${fmtDt(e.savedAt)}</div>
            </div>
            <button onClick=${()=>loadS(e.name)} style=${p({color:C.blu,border:`1px solid ${C.blu}40`,fontFamily:C.cnd,fontWeight:700,fontSize:11,padding:'4px 10px'})}>LOAD</button>
            <button onClick=${()=>delS(e.name)} style=${p({color:C.red,border:'1px solid #3a1a1a',padding:'3px 8px',fontSize:13})}>🗑</button>
          </div>`)}
        </div>`}
      <div style=${{borderTop:`1px solid ${C.bdr}`,paddingTop:10}}>
        <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:7}}>EXPORT / IMPORT</div>
        <div style=${{display:'flex',gap:5,flexWrap:'wrap'}}>
          <button onClick=${expCur} style=${p({color:C.cyn,border:`1px solid ${C.cyn}40`,fontFamily:C.cnd,fontWeight:700,fontSize:11,padding:'6px 10px'})}>📤 現在のシーケンス書き出し</button>
          <button onClick=${expLib} style=${p({color:C.cyn,border:`1px solid ${C.cyn}40`,fontFamily:C.cnd,fontWeight:700,fontSize:11,padding:'6px 10px'})}>📚 ライブラリ全体を書き出し</button>
          <button onClick=${()=>impR.current&&impR.current.click()} style=${p({color:C.amb,border:`1px solid ${C.amb}40`,fontFamily:C.cnd,fontWeight:700,fontSize:11,padding:'6px 10px'})}>📂 JSONを読み込む</button>
          <input ref=${impR} type="file" accept=".json" onChange=${impFile} style=${{display:'none'}}/>
        </div>
      </div>
    </div>`:''}

    <!-- MAIN ROW -->
    <div style=${{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>

      <!-- BEAT DISPLAY -->
      <div style=${{flex:'1 1 250px',minWidth:240,background:C.pan,border:`1px solid ${inCI?C.cyn:flash?C.amb:C.bdr}`,borderRadius:8,padding:14,boxShadow:inCI?`0 0 20px ${C.cyn}25`:flash?`0 0 20px ${C.ambG}`:'none',transition:'border-color .06s,box-shadow .06s'}}>
        ${inCI?html`<div style=${{fontFamily:C.fnt,fontSize:9,color:C.cyn,letterSpacing:4,marginBottom:5,animation:'pulse .5s ease-in-out infinite alternate'}}>◆ PRE-COUNT</div>`:''}
        <div style=${{fontFamily:C.fnt,fontWeight:900,lineHeight:1,marginBottom:8,display:'flex',alignItems:'baseline',gap:4}}>
          <span style=${{fontSize:56,color:sCol,textShadow:play?`0 0 20px ${sCol}40`:'none',transition:'color .15s'}}>${cBlk.n}</span>
          <span style=${{fontSize:24,color:C.mut,paddingBottom:3}}>/</span>
          <span style=${{fontSize:36,color:sCol,opacity:.9}}>${cBlk.d}</span>
          ${cBlk.tempoMode&&cBlk.tempoMode!=='fixed'?html`<span style=${{fontSize:12,color:C.pur,marginLeft:4,fontFamily:C.cnd,fontStyle:'italic'}}>${cTM.sym||cTM.label}</span>`:''}
        </div>
        ${cBlk.label||cBlk.groups?html`<div style=${{display:'flex',gap:8,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
          ${cBlk.label?html`<span style=${{fontFamily:C.cnd,fontSize:11,color:C.amb,letterSpacing:2}}>${cBlk.label.toUpperCase()}</span>`:''}
          ${cBlk.groups?html`<span style=${{fontFamily:C.mon,fontSize:10,color:C.mut}}>[${cBlk.groups}]</span>`:''}
        </div>`:''}
        <div style=${{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
          ${Array.from({length:cBlk.n},(_,i)=>{
            const lv=acc[i],isA=aBeat===i&&play,sz=lv===2?26:lv===1?20:16;
            return html`<div key=${i} style=${{width:sz,height:sz,borderRadius:'50%',flexShrink:0,
              background:isA?(lv===2?dCol:lv===1?dCol+'cc':'#aaaacc'):(lv===2?C.ambD:'#191923'),
              border:`1.5px solid ${isA?dCol:lv===2?'#3a2610':'#202030'}`,
              boxShadow:isA&&lv===2?`0 0 10px ${dCol},0 0 20px ${dCol}40`:'none',
              transition:'background .04s,box-shadow .04s'}}/>`;
          })}
        </div>
        <div style=${{display:'flex',alignItems:'baseline',gap:6,marginBottom:4}}>
          <span style=${{fontFamily:C.fnt,fontSize:20,fontWeight:700,color:inCI?C.cyn:play?C.amb:C.mut}}>
            ${inCI?'——':play?String(gMeas).padStart(2,'0'):'——'}
          </span>
          <span style=${{fontFamily:C.cnd,fontSize:11,color:C.mut}}>/ ${totM} MEASURES</span>
        </div>
        ${play&&!inCI?html`<div style=${{fontFamily:C.cnd,fontSize:10,color:C.mut}}>
          BEAT ${dBeat+1}/${cBlk.n}  REP ${dRep+1}/${cBlk.reps}
          ${lBpm&&lBpm!==effBpm?html`<span style=${{marginLeft:8,color:C.pur}}>♩=${lBpm}</span>`:''}
        </div>`:''}
        ${inCI?html`<div style=${{fontFamily:C.cnd,fontSize:10,color:C.cyn}}>BEAT ${ciBt+1}/${cBlk.n}</div>`:''}
      </div>

      <!-- TRANSPORT -->
      <div style=${{flex:'1 1 230px',minWidth:210,background:C.pan,border:`1px solid ${C.bdr}`,borderRadius:8,padding:14,display:'flex',flexDirection:'column',gap:10}}>

        <!-- SOUND TYPE -->
        <div>
          <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>SOUND TYPE</div>
          <div style=${{display:'flex',gap:4,flexWrap:'wrap'}}>
            ${Object.entries(SOUNDS).map(([id,s])=>html`<button key=${id} onClick=${()=>setSnd(id)}
              style=${p({fontFamily:C.fnt,fontSize:9,letterSpacing:1,padding:'5px 7px'},snd===id?{background:C.amb,color:'#000',border:`1px solid ${C.amb}`}:{color:C.mut})}>${s.label}</button>`)}
          </div>
        </div>

        <!-- VOLUME -->
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3}}>VOLUME</span>
            <span style=${{fontFamily:C.fnt,fontSize:13,color:vol>100?C.red:C.amb,fontWeight:700}}>
              ${vol}%${vol>100?html`<span style=${{fontSize:9,color:C.red,marginLeft:4}}>BOOST</span>`:''}
            </span>
          </div>
          <input type="range" min="0" max="300" value=${vol} onInput=${e=>setVol(+e.target.value)}
            style=${{width:'100%',accentColor:vol>100?C.red:C.amb,height:22,marginBottom:4}}/>
          <div style=${{display:'flex',gap:3,flexWrap:'wrap'}}>
            ${[50,75,100,150,200,250,300].map(v=>html`<button key=${v} onClick=${()=>setVol(v)}
              style=${p({padding:'3px 5px',fontSize:10,minHeight:26},
                vol===v?(v>100?{background:C.red,color:'#000',border:`1px solid ${C.red}`}:{background:C.amb,color:'#000',border:`1px solid ${C.amb}`})
                      :(v>100?{color:'#cc4444',border:'1px solid #3a1818'}:{color:C.mut}))}>${v}%</button>`)}
          </div>
        </div>

        <!-- SUBDIVISION -->
        <div>
          <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>SUBDIVISION</div>
          <div style=${{display:'flex',gap:4,flexWrap:'wrap'}}>
            ${[[0,'OFF'],[2,'♪÷2 8分'],[3,'♪÷3 3連'],[4,'♪÷4 16分']].map(([v,lb])=>html`<button key=${v} onClick=${()=>setSub(v)}
              style=${p({fontFamily:C.cnd,fontWeight:700,fontSize:10,padding:'5px 8px',letterSpacing:1},sub===v?{background:C.grn,color:'#000',border:`1px solid ${C.grn}`}:{color:C.mut})}>${lb}</button>`)}
          </div>
        </div>

        <!-- COUNT-IN -->
        <button onClick=${()=>setCI(c=>!c)} style=${p({fontFamily:C.cnd,fontWeight:700,fontSize:11,letterSpacing:2,padding:'7px',width:'100%'},ci?{background:C.cyn+'22',color:C.cyn,border:`1px solid ${C.cyn}`}:{background:'transparent',color:C.mut})}>
          ${ci?'◆ 予備拍 ON (1小節)':'◇ 予備拍 OFF'}
        </button>

        <!-- BPM -->
        <div>
          <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:4}}>BPM (♩ 基準)</div>
          <div style=${{display:'flex',alignItems:'center',gap:5}}>
            <button onClick=${()=>setBpm(b=>Math.max(20,b-1))} style=${p({minWidth:36,fontSize:16,padding:'4px'})}>−</button>
            <input type="number" value=${bpm} min="20" max="300"
              onInput=${e=>setBpm(Math.min(300,Math.max(20,+e.target.value||60)))}
              style=${{flex:1,background:'#0a0a0e',border:`1px solid ${C.bdr}`,color:C.amb,borderRadius:4,padding:'5px 0',fontFamily:C.fnt,fontSize:20,fontWeight:700,textAlign:'center'}}/>
            <button onClick=${()=>setBpm(b=>Math.min(300,b+1))} style=${p({minWidth:36,fontSize:16,padding:'4px'})}>+</button>
          </div>
          <input type="range" min="20" max="300" value=${bpm} onInput=${e=>setBpm(+e.target.value)} style=${{width:'100%',marginTop:5,accentColor:C.amb,height:20}}/>
        </div>

        <button onClick=${tapTempo} style=${p({fontFamily:C.cnd,fontWeight:700,fontSize:13,letterSpacing:3,padding:10,borderRadius:5},tapF?{background:C.amb,color:'#000',border:`1px solid ${C.amb}`}:{})}>
          TAP TEMPO
        </button>

        <!-- TEMPO % -->
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3}}>TEMPO %</span>
            <span style=${{fontFamily:C.fnt,fontSize:11,color:C.amb}}>=${effBpm} ♩/min</span>
          </div>
          <div style=${{display:'flex',gap:3,flexWrap:'wrap',marginBottom:4}}>
            ${[50,60,70,75,80,90,100].map(v=>html`<button key=${v} onClick=${()=>setPct(v)}
              style=${p({padding:'3px 5px',fontSize:10,minHeight:28},pct===v?{background:C.amb,color:'#000',border:`1px solid ${C.amb}`}:{color:C.mut})}>${v}%</button>`)}
          </div>
          <div style=${{display:'flex',gap:5,alignItems:'center'}}>
            <input type="range" min="25" max="200" value=${pct} onInput=${e=>setPct(+e.target.value)} style=${{flex:1,accentColor:C.amb,height:18}}/>
            <input type="number" value=${pct} min="25" max="200" onInput=${e=>setPct(Math.min(200,Math.max(25,+e.target.value||100)))}
              style=${{...NUM,width:48,fontSize:12}}/>
            <span style=${{fontFamily:C.cnd,fontSize:10,color:C.mut}}>%</span>
          </div>
        </div>

        <button onClick=${()=>play?stopPlay():startPlay()} style=${{background:play?C.red:C.amb,color:'#000',border:'none',borderRadius:6,padding:'14px 0',fontFamily:C.fnt,fontWeight:900,fontSize:14,letterSpacing:4,cursor:'pointer',boxShadow:play?`0 0 20px #e8404060`:`0 0 16px ${C.ambG}`,minHeight:50}}>
          ${play?'■ STOP':'▶ PLAY'}
        </button>
      </div>
    </div>

    <!-- SEQUENCE EDITOR -->
    <div style=${{background:C.pan,border:`1px solid ${C.bdr}`,borderRadius:8,padding:14}}>
      <div style=${{fontFamily:C.cnd,fontSize:10,color:C.mut,letterSpacing:3,fontWeight:600,marginBottom:8}}>
        SEQUENCE <span style=${{color:'#333'}}>(${seq.length} BLOCKS · ${totM} MEASURES)</span>
      </div>
      <div style=${{maxHeight:280,overflowY:'auto',marginBottom:10}}>
        ${seq.map((blk,i)=>{
          const isA=play&&!inCI&&dBlk===i;
          const tm=TMODES.find(m=>m.id===blk.tempoMode)||TMODES[0];
          return html`<div key=${blk.id} style=${{display:'flex',alignItems:'center',gap:4,padding:'5px 7px',marginBottom:4,
            background:isA?'#151f12':'#0f0f14',border:`1px solid ${isA?C.grn:C.bdr}`,
            borderRadius:5,overflowX:'auto',flexWrap:'nowrap'}}>
            <div style=${{width:5,height:5,borderRadius:'50%',flexShrink:0,background:isA?C.grn:'#1e1e28'}}/>
            <span style=${{fontFamily:C.fnt,fontSize:9,color:'#333',width:12,flexShrink:0,textAlign:'center'}}>${i+1}</span>
            <input type="number" value=${blk.n} min="1" max="32" onInput=${e=>upBlk(blk.id,'n',Math.max(1,+e.target.value||4))} style=${{...NUM,width:34}}/>
            <span style=${{color:C.mut,fontSize:13,flexShrink:0}}>/</span>
            <select value=${blk.d} onChange=${e=>upBlk(blk.id,'d',+e.target.value)} style=${{...NUM,width:36,cursor:'pointer',paddingLeft:3,flexShrink:0}}>
              ${[2,4,8,16,32].map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
            </select>
            <span style=${{color:C.mut,fontSize:12,flexShrink:0}}>×</span>
            <input type="number" value=${blk.reps} min="1" max="999" onInput=${e=>upBlk(blk.id,'reps',Math.max(1,+e.target.value||1))} style=${{...NUM,width:42}}/>
            <input value=${blk.groups} onInput=${e=>upBlk(blk.id,'groups',e.target.value)} placeholder="groups"
              style=${{...SEQ,width:76,color:C.mut,fontSize:11,flexShrink:0}}/>
            <input value=${blk.label} onInput=${e=>upBlk(blk.id,'label',e.target.value)} placeholder="label"
              style=${{...SEQ,width:70,flexShrink:0}}/>
            <select value=${blk.tempoMode||'fixed'} onChange=${e=>upBlk(blk.id,'tempoMode',e.target.value)}
              style=${{...SEQ,width:72,color:blk.tempoMode&&blk.tempoMode!=='fixed'?C.pur:C.mut,fontSize:11,cursor:'pointer',flexShrink:0}}>
              ${TMODES.map(m=>html`<option key=${m.id} value=${m.id}>${m.label}</option>`)}
            </select>
            ${blk.tempoMode&&blk.tempoMode!=='fixed'&&blk.tempoMode!=='rubato'?html`
              <span style=${{color:C.pur,fontSize:11,flexShrink:0}}>→</span>
              <input value=${blk.bpmEnd} onInput=${e=>upBlk(blk.id,'bpmEnd',e.target.value)} placeholder="BPM"
                style=${{...SEQ,width:46,color:C.pur,fontSize:11,flexShrink:0}}/>
              <select value=${blk.tempoShape||'exp'} onChange=${e=>upBlk(blk.id,'tempoShape',e.target.value)}
                style=${{...SEQ,width:42,color:'#888',fontSize:10,cursor:'pointer',flexShrink:0}}>
                <option value="exp">exp</option><option value="linear">lin</option>
              </select>
            `:''}
            <button onClick=${()=>mvBlk(blk.id,-1)} disabled=${i===0} style=${p(ICO,{opacity:i===0?.2:1,padding:'3px 5px',minWidth:22})}>▲</button>
            <button onClick=${()=>mvBlk(blk.id,1)} disabled=${i===seq.length-1} style=${p(ICO,{opacity:i===seq.length-1?.2:1,padding:'3px 5px',minWidth:22})}>▼</button>
            <button onClick=${()=>dupBlk(blk.id)} style=${p(ICO,{padding:'3px 5px',minWidth:22})}>⧉</button>
            <button onClick=${()=>rmBlk(blk.id)} style=${p(ICO,{color:C.red,padding:'3px 5px',minWidth:22})}>✕</button>
          </div>`;
        })}
      </div>

      <!-- Tempo legend -->
      <div style=${{marginBottom:10,padding:'6px 10px',background:'#0d0d12',borderRadius:5,border:`1px solid ${C.bdr}`}}>
        <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>TEMPO CHANGE SYMBOLS</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:'2px 10px'}}>
          ${TMODES.filter(m=>m.id!=='fixed').map(m=>html`<span key=${m.id} style=${{fontFamily:C.cnd,fontSize:10,color:C.mut}}>
            <span style=${{color:C.pur,fontStyle:'italic'}}>${m.label}</span> ${m.desc}
          </span>`)}
        </div>
      </div>

      <!-- Quick presets -->
      <div style=${{marginBottom:10}}>
        <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>QUICK ADD</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:4}}>
          ${PRESETS.map(pr=>html`<button key=${pr.label} onClick=${()=>setSeq(s=>[...s,mkBlk(pr.n,pr.d,1,'',pr.g)])}
            style=${{background:C.pan2,border:`1px solid ${C.bdr}`,color:C.amb,borderRadius:4,padding:'5px 9px',fontFamily:C.fnt,fontSize:11,letterSpacing:1,minHeight:30,cursor:'pointer'}}>${pr.label}</button>`)}
        </div>
      </div>

      <!-- Custom add -->
      <div style=${{marginBottom:10}}>
        <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>CUSTOM ADD</div>
        <div style=${{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
          <input value=${addN} onInput=${e=>setAddN(e.target.value)} placeholder="N" style=${{...NUM,width:36}}/>
          <span style=${{color:C.mut}}>/</span>
          <select value=${addD} onChange=${e=>setAddD(e.target.value)} style=${{...NUM,width:38,cursor:'pointer'}}>
            ${[2,4,8,16,32].map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
          </select>
          <span style=${{color:C.mut}}>×</span>
          <input value=${addR} onInput=${e=>setAddR(e.target.value)} placeholder="回" style=${{...NUM,width:42}}/>
          <input value=${addGr} onInput=${e=>setAddGr(e.target.value)} placeholder="groups" style=${{...SEQ,width:100,color:C.mut,fontSize:11}}/>
          <input value=${addLb} onInput=${e=>setAddLb(e.target.value)} placeholder="ラベル" style=${{...SEQ,flex:1,minWidth:70}}/>
          <button onClick=${addBlk} style=${{background:C.amb,color:'#000',border:'none',borderRadius:4,padding:'6px 14px',fontFamily:C.cnd,fontWeight:700,fontSize:13,letterSpacing:1,cursor:'pointer',minHeight:32}}>+ ADD</button>
        </div>
      </div>

      <!-- Batch -->
      <div>
        <div style=${{fontFamily:C.cnd,fontSize:9,color:C.mut,letterSpacing:3,marginBottom:5}}>BATCH</div>
        <div style=${{display:'flex',gap:5}}>
          <input value=${batch} onInput=${e=>setBatch(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&parseBatch()}
            placeholder="4/4×8 Intro, 7/8×4 Verse, 13/8×1"
            style=${{...SEQ,flex:1,padding:'7px 10px',fontSize:12}}/>
          <button onClick=${parseBatch} style=${p({color:C.amb,border:`1px solid ${C.amb}40`,fontFamily:C.cnd,fontWeight:700,fontSize:12,letterSpacing:1})}>PARSE</button>
          <button onClick=${clearAll} style=${p({color:C.red,border:'1px solid #3a1a1a',fontFamily:C.cnd,fontWeight:700,fontSize:12,letterSpacing:1})}>CLR</button>
        </div>
      </div>
    </div>

    <div style=${{textAlign:'center',marginTop:10,fontFamily:C.cnd,fontSize:10,color:'#1e1e2a',letterSpacing:3}}>
      KEEP-BEAT v2.2 · BRASS BAND VARIABLE METER METRONOME
    </div>
  </div>`;
}

// show app
document.getElementById('loading').style.display = 'none';
document.getElementById('root').style.display = '';
render(html`<${KeepBeat}/>`, document.getElementById('root'));
</script>
</body>
</html>
