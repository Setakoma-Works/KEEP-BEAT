const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════
//  AUDIO — CLICK SOUNDS  (level: 2=downbeat 1=accent 0=beat -1=subdivision)
// ═══════════════════════════════════════════════════════
function makeNoiseBuf(ctx,dur=0.03){const len=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return b;}
function gainForLevel(l){return l===2?1.0:l===1?.62:l===0?.35:.18;}
function freqForLevel(base,l){return l===2?base:l===1?base*.72:l===0?base*.55:base*.38;}

function sndWood(ctx,level,time){
  const f=freqForLevel(1100,level),g=gainForLevel(level);
  const src=ctx.createBufferSource();src.buffer=makeNoiseBuf(ctx,.022);
  const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=f*1.7;bp.Q.value=9;
  const gn=ctx.createGain();gn.gain.setValueAtTime(g*1.3,time);gn.gain.exponentialRampToValueAtTime(.001,time+.02);
  src.connect(bp);bp.connect(gn);gn.connect(ctx.destination);src.start(time);src.stop(time+.025);
  const osc=ctx.createOscillator(),ev=ctx.createGain();osc.type="triangle";
  osc.frequency.setValueAtTime(f,time);osc.frequency.exponentialRampToValueAtTime(f*.45,time+.02);
  ev.gain.setValueAtTime(g*.9,time);ev.gain.exponentialRampToValueAtTime(.001,time+.02);
  osc.connect(ev);ev.connect(ctx.destination);osc.start(time);osc.stop(time+.025);
}
function sndClick(ctx,level,time){
  const f=freqForLevel(1400,level),g=gainForLevel(level);
  const osc=ctx.createOscillator(),ev=ctx.createGain();osc.type="sine";osc.frequency.value=f;
  ev.gain.setValueAtTime(g,time);ev.gain.exponentialRampToValueAtTime(.001,time+.04);
  osc.connect(ev);ev.connect(ctx.destination);osc.start(time);osc.stop(time+.05);
}
function sndHihat(ctx,level,time){
  const g=gainForLevel(level),dur=level===2?.06:level===1?.045:level===0?.03:.018;
  const src=ctx.createBufferSource();src.buffer=makeNoiseBuf(ctx,dur+.01);
  const hp=ctx.createBiquadFilter();hp.type="highpass";hp.frequency.value=level===2?7500:9500;
  const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=10000;bp.Q.value=.5;
  const ev=ctx.createGain();ev.gain.setValueAtTime(g,time);ev.gain.exponentialRampToValueAtTime(.001,time+dur);
  src.connect(hp);hp.connect(bp);bp.connect(ev);ev.connect(ctx.destination);src.start(time);src.stop(time+dur+.01);
}
function sndRim(ctx,level,time){
  const f=freqForLevel(600,level),g=gainForLevel(level);
  const src=ctx.createBufferSource();src.buffer=makeNoiseBuf(ctx,.04);
  const bp=ctx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=2500;bp.Q.value=1.5;
  const gn=ctx.createGain();gn.gain.setValueAtTime(g*.8,time);gn.gain.exponentialRampToValueAtTime(.001,time+.032);
  src.connect(bp);bp.connect(gn);gn.connect(ctx.destination);src.start(time);src.stop(time+.04);
  const osc=ctx.createOscillator(),ev=ctx.createGain();osc.type="square";
  osc.frequency.setValueAtTime(f,time);osc.frequency.exponentialRampToValueAtTime(f*.4,time+.038);
  ev.gain.setValueAtTime(g*.7,time);ev.gain.exponentialRampToValueAtTime(.001,time+.038);
  osc.connect(ev);ev.connect(ctx.destination);osc.start(time);osc.stop(time+.042);
}
function sndBell(ctx,level,time){
  const f=freqForLevel(2200,level),g=gainForLevel(level),dec=level===2?.35:level===1?.25:level===0?.18:.10;
  const o1=ctx.createOscillator(),e1=ctx.createGain();o1.type="sine";o1.frequency.value=f;
  e1.gain.setValueAtTime(g,time);e1.gain.exponentialRampToValueAtTime(.001,time+dec);
  o1.connect(e1);e1.connect(ctx.destination);o1.start(time);o1.stop(time+dec+.01);
  const o2=ctx.createOscillator(),e2=ctx.createGain();o2.type="sine";o2.frequency.value=f*2.76;
  e2.gain.setValueAtTime(g*.4,time);e2.gain.exponentialRampToValueAtTime(.001,time+dec*.6);
  o2.connect(e2);e2.connect(ctx.destination);o2.start(time);o2.stop(time+dec*.6+.01);
}
const SOUNDS={wood:{fn:sndWood,label:"WOOD",desc:"ウッドブロック"},click:{fn:sndClick,label:"CLICK",desc:"デジタルクリック"},hihat:{fn:sndHihat,label:"HI-HAT",desc:"ハイハット"},rim:{fn:sndRim,label:"RIM",desc:"リムショット"},bell:{fn:sndBell,label:"BELL",desc:"ベル"}};
function playSound(ctx,type,level,time){(SOUNDS[type]?.fn??sndWood)(ctx,level,time);}
function beatDurSec(d,bpm){return(60/bpm)*(4/d);}

// ═══════════════════════════════════════════════════════
//  TUNER — autocorrelation pitch detection
// ═══════════════════════════════════════════════════════
function autoCorrelate(buf,sr){
  const N=buf.length;let rms=0;
  for(let i=0;i<N;i++)rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/N);if(rms<0.008)return -1;
  const minOff=Math.floor(sr/3000),maxOff=Math.min(Math.floor(sr/40),Math.floor(N/2));
  let bestC=0,bestOff=-1;
  for(let off=minOff;off<=maxOff;off++){
    let c=0,cnt=N-off;
    for(let i=0;i<cnt;i++)c+=buf[i]*buf[i+off];
    c/=cnt;if(c>bestC){bestC=c;bestOff=off;}
  }
  if(bestOff<1||bestC<0.005)return -1;
  // parabolic interpolation
  const c1=(()=>{let c=0,cnt=N-bestOff+1;for(let i=0;i<cnt;i++)c+=buf[i]*buf[i+bestOff-1];return c/cnt;})();
  const c3=(()=>{let c=0,cnt=N-bestOff-1;for(let i=0;i<cnt;i++)c+=buf[i]*buf[i+bestOff+1];return c/cnt;})();
  const a=(c1+c3-2*bestC)/2,b=(c3-c1)/2;
  const fine=a!==0?bestOff-b/(2*a):bestOff;
  return sr/fine;
}
const NOTE_NAMES=["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];
function freqToNote(freq,a4=442){
  if(freq<=0)return null;
  const n=12*Math.log2(freq/a4)+69;
  const r=Math.round(n),cents=Math.round((n-r)*100);
  const oct=Math.floor(r/12)-1,name=NOTE_NAMES[((r%12)+12)%12];
  return{name,oct,cents,freq:freq.toFixed(1)};
}

// ═══════════════════════════════════════════════════════
//  TEMPO CHANGE
// ═══════════════════════════════════════════════════════
const TEMPO_MODES=[
  {id:"fixed",   label:"─",        sym:"",           desc:"固定テンポ"},
  {id:"rit",     label:"rit.",      sym:"rit.",        desc:"だんだん遅く"},
  {id:"rall",    label:"rall.",     sym:"rallentando", desc:"だんだん遅く（広く）"},
  {id:"allarg",  label:"allarg.",   sym:"allargando",  desc:"広がりながら遅く"},
  {id:"morendo", label:"mor.",      sym:"morendo",     desc:"消えるように遅く"},
  {id:"accel",   label:"accel.",    sym:"accel.",      desc:"だんだん速く"},
  {id:"string",  label:"string.",   sym:"stringendo",  desc:"急き立てて速く"},
  {id:"poco_rit",label:"p.rit.",    sym:"poco rit.",   desc:"少しだんだん遅く"},
  {id:"p_accel", label:"p.accel.", sym:"poco accel.", desc:"少しだんだん速く"},
  {id:"rubato",  label:"rubato",    sym:"rubato",      desc:"自由なテンポ"},
];
const TEMPO_DEF_RATIO={rit:.55,rall:.45,allarg:.50,morendo:.22,accel:1.65,string:1.90,poco_rit:.80,p_accel:1.20};

function getTempoBpm(blk,beatInBlock,totalBeats,effBpm){
  const{tempoMode,bpmEnd,tempoShape}=blk;
  if(!tempoMode||tempoMode==="fixed")return effBpm;
  const t=totalBeats>1?beatInBlock/(totalBeats-1):0;
  const start=effBpm;
  if(tempoMode==="rubato")return start*(1+(Math.random()*2-1)*0.08);
  let end;
  if(bpmEnd&&!isNaN(parseFloat(bpmEnd))&&parseFloat(bpmEnd)>0)end=parseFloat(bpmEnd);
  else end=start*(TEMPO_DEF_RATIO[tempoMode]??1);
  if(!tempoShape||tempoShape==="exp"){return start<=0||end<=0?start:start*Math.pow(end/start,t);}
  return start+(end-start)*t;
}

// ═══════════════════════════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════════════════════════
let _uid=0;const uid=()=>++_uid;
function mkBlock(n=4,d=4,reps=1,label="",groups="",tempoMode="fixed",bpmEnd="",tempoShape="exp"){
  return{id:uid(),n,d,reps,label,groups,tempoMode,bpmEnd,tempoShape};
}
function parseGroups(str,total){
  if(!str?.trim())return null;
  const parts=str.split("+").map(s=>parseInt(s.trim())).filter(n=>n>0);
  if(!parts.length)return null;
  return parts.reduce((a,b)=>a+b,0)===total?parts:null;
}
function getAccentLevels(n,groupsStr){
  const groups=parseGroups(groupsStr,n);
  if(!groups)return Array.from({length:n},(_,i)=>i===0?2:1);
  const acc=new Array(n).fill(0);let p=0;
  for(const g of groups){acc[p]=p===0?2:1;p+=g;}
  return acc;
}
function seqToData(seq){return seq.map(({id,...r})=>r);}
function dataToSeq(data){return data.map(b=>({...b,id:uid()}));}

const PRESETS=[
  {label:"2/4",n:2,d:4,g:""},{label:"3/4",n:3,d:4,g:""},{label:"4/4",n:4,d:4,g:""},
  {label:"5/4",n:5,d:4,g:"2+3"},{label:"6/8",n:6,d:8,g:"3+3"},{label:"7/8",n:7,d:8,g:"2+2+3"},
  {label:"5/8",n:5,d:8,g:"2+3"},{label:"9/8",n:9,d:8,g:"3+3+3"},{label:"11/8",n:11,d:8,g:"3+3+2+3"},
  {label:"12/8",n:12,d:8,g:"3+3+3+3"},{label:"13/8",n:13,d:8,g:"3+3+3+4"},{label:"7/4",n:7,d:4,g:"3+4"},
];

// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
const STORAGE_INDEX="kb-index",STORAGE_LAST="kb-last";
const songKey=name=>`kb-song-${name.replace(/[^a-zA-Z0-9\-_]/g,"_")}`;
async function stGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
async function stSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}}
async function stDel(k){try{localStorage.removeItem(k);return true;}catch{return false;}}

// ═══════════════════════════════════════════════════════
//  STYLES
// ═══════════════════════════════════════════════════════
const T={
  bg:"#0b0b0f",panel:"#131318",panel2:"#1a1a22",border:"#252535",
  amber:"#f5a623",amberGlow:"#f5a62340",amberDim:"#2e1f08",
  red:"#e84040",green:"#3dffa0",blue:"#4aade8",cyan:"#30d5c8",purple:"#b06af0",
  text:"#e0ddd8",muted:"#55556a",
  font:"'Orbitron',sans-serif",mono:"'Share Tech Mono',monospace",cond:"'Barlow Condensed',sans-serif",
};
const S={
  numInput:{background:"#0a0a0e",border:`1px solid ${T.border}`,color:T.amber,borderRadius:4,padding:"4px",fontFamily:T.font,fontSize:13,textAlign:"center",width:40},
  seqInput:{background:"#0a0a0e",border:`1px solid ${T.border}`,color:T.text,borderRadius:4,padding:"4px 6px",fontFamily:T.mono,fontSize:12},
  btnSm:{background:T.panel2,border:`1px solid ${T.border}`,borderRadius:4,color:T.text,padding:"5px 10px",fontFamily:T.mono,fontSize:12,flexShrink:0},
  btnIcon:{background:"transparent",border:`1px solid ${T.border}`,borderRadius:3,color:T.muted,padding:"2px 6px",fontFamily:"monospace",fontSize:11,flexShrink:0,lineHeight:1.6},
};

// ═══════════════════════════════════════════════════════
//  MAIN COMPONENT
// ═══════════════════════════════════════════════════════
function KeepBeat(){
  // Core
  const [seq,setSeq]           = useState([mkBlock(4,4,4,"","")]);
  const [bpm,setBpm]           = useState(120);
  const [pct,setPct]           = useState(100);
  const [playing,setPlaying]   = useState(false);
  const [loop,setLoop]         = useState(true);
  const [soundType,setSoundType] = useState("wood");
  const [countIn,setCountIn]   = useState(true);
  const [subdivide,setSubdivide] = useState(0); // 0=off 2 3 4
  const [tapFlash,setTapFlash] = useState(false);

  // Display
  const [dBlock,setDBlock]  = useState(0);
  const [dBeat,setDBeat]    = useState(-1);
  const [dRep,setDRep]      = useState(0);
  const [flash,setFlash]    = useState(false);
  const [isCI,setIsCI]      = useState(false);
  const [dCIBeat,setDCIBeat]= useState(-1);
  const [liveBpm,setLiveBpm]= useState(null); // current beat BPM display

  // Add-form
  const [addNv,setAddNv]       = useState("4");
  const [addDv,setAddDv]       = useState("4");
  const [addRv,setAddRv]       = useState("1");
  const [addLabel,setAddLabel] = useState("");
  const [addGroups,setAddGroups] = useState("");
  const [batchText,setBatchText] = useState("");

  // Library
  const [library,setLibrary]       = useState([]);
  const [showLib,setShowLib]       = useState(false);
  const [saveName,setSaveName]     = useState("");
  const [saveMsg,setSaveMsg]       = useState("");
  const [loadingLib,setLoadingLib] = useState(true);
  const [currentFile,setCurrentFile] = useState("");

  // Tuner
  const [showTuner,setShowTuner] = useState(false);
  const [tunerOn,setTunerOn]     = useState(false);
  const [tunerA4,setTunerA4]     = useState(442);
  const [tunerNote,setTunerNote] = useState(null);
  const [tunerErr,setTunerErr]   = useState("");

  // Refs
  const ctxRef=useRef(null),timRef=useRef(null),nxtRef=useRef(0),posRef=useRef({bi:0,beat:0,rep:0});
  const seqRef=useRef(seq),bpmRef=useRef(bpm),pctRef=useRef(pct),loopRef=useRef(loop);
  const playRef=useRef(false),sndRef=useRef(soundType),tapRef=useRef([]);
  const inCIRef=useRef(false),ciBeatRef=useRef(0);
  const subdivideRef=useRef(0),importFileRef=useRef(null);
  // Tuner refs
  const tunerStreamRef=useRef(null),tunerAnaRef=useRef(null),tunerAnimRef=useRef(null);
  const tunerA4Ref=useRef(442),tunerOnRef=useRef(false);

  useEffect(()=>{seqRef.current=seq;},[seq]);
  useEffect(()=>{bpmRef.current=bpm;},[bpm]);
  useEffect(()=>{pctRef.current=pct;},[pct]);
  useEffect(()=>{loopRef.current=loop;},[loop]);
  useEffect(()=>{sndRef.current=soundType;},[soundType]);
  useEffect(()=>{subdivideRef.current=subdivide;},[subdivide]);
  useEffect(()=>{tunerA4Ref.current=tunerA4;},[tunerA4]);

  const effBpm=Math.round(bpm*pct/100);

  // Auto-save
  const autoTmr=useRef(null);
  useEffect(()=>{
    clearTimeout(autoTmr.current);
    autoTmr.current=setTimeout(()=>stSet(STORAGE_LAST,{seq:seqToData(seq),bpm,pct,loop,soundType,subdivide,tunerA4}),800);
    return()=>clearTimeout(autoTmr.current);
  },[seq,bpm,pct,loop,soundType,subdivide,tunerA4]);

  // Load on mount
  useEffect(()=>{
    (async()=>{
      setLoadingLib(true);
      const last=await stGet(STORAGE_LAST);
      if(last?.seq?.length){
        setSeq(dataToSeq(last.seq));
        if(last.bpm)setBpm(last.bpm);
        if(last.pct)setPct(last.pct);
        if(last.loop!==undefined)setLoop(last.loop);
        if(last.soundType)setSoundType(last.soundType);
        if(last.subdivide!==undefined)setSubdivide(last.subdivide);
        if(last.tunerA4)setTunerA4(last.tunerA4);
      }
      const idx=await stGet(STORAGE_INDEX);
      if(Array.isArray(idx))setLibrary(idx);
      setLoadingLib(false);
    })();
    return()=>{stopTuner();};
  },[]);

  // ── SCHEDULER ──────────────────────────────────────
  const sched=useCallback(()=>{
    if(!playRef.current)return;
    const ctx=ctxRef.current,s=seqRef.current;
    if(!s.length){clearTimeout(timRef.current);return;}
    while(nxtRef.current<ctx.currentTime+0.12){
      const effBpmNow=bpmRef.current*pctRef.current/100;
      if(inCIRef.current){
        const blk=s[0],beat=ciBeatRef.current;
        const dur=beatDurSec(blk.d,effBpmNow);
        const accents=getAccentLevels(blk.n,blk.groups),level=accents[beat]??1;
        playSound(ctx,sndRef.current,level,nxtRef.current);
        const t=nxtRef.current,cb=beat;
        setTimeout(()=>{if(playRef.current){setIsCI(true);setDCIBeat(cb);}},Math.max(0,(t-ctx.currentTime)*1000-15));
        nxtRef.current+=dur;ciBeatRef.current++;
        if(ciBeatRef.current>=blk.n){inCIRef.current=false;const ts=nxtRef.current;setTimeout(()=>{if(playRef.current)setIsCI(false);},Math.max(0,(ts-ctx.currentTime)*1000-20));}
        continue;
      }
      const{bi,beat,rep}=posRef.current,blk=s[bi];
      const beatInBlock=rep*blk.n+beat,totalBeats=blk.n*blk.reps;
      const beatBpm=getTempoBpm(blk,beatInBlock,totalBeats,effBpmNow);
      const dur=beatDurSec(blk.d,beatBpm);
      const accents=getAccentLevels(blk.n,blk.groups),level=accents[beat]??1;
      playSound(ctx,sndRef.current,level,nxtRef.current);
      // Subdivision
      const sub=subdivideRef.current;
      if(sub>1){const sd=dur/sub;for(let sv=1;sv<sub;sv++)playSound(ctx,sndRef.current,-1,nxtRef.current+sv*sd);}
      const t=nxtRef.current,cbi=bi,cb=beat,cr=rep,lv=level,bb=Math.round(beatBpm);
      setTimeout(()=>{
        if(!playRef.current)return;
        setDBlock(cbi);setDBeat(cb);setDRep(cr);setLiveBpm(bb);
        if(lv===2){setFlash(true);setTimeout(()=>setFlash(false),80);}
      },Math.max(0,(t-ctx.currentTime)*1000-15));
      nxtRef.current+=dur;
      let nb=beat+1,nr=rep,nbi=bi;
      if(nb>=blk.n){nb=0;nr++;if(nr>=blk.reps){nr=0;nbi++;if(nbi>=s.length){if(loopRef.current)nbi=0;else{playRef.current=false;setPlaying(false);setLiveBpm(null);break;}}}}
      posRef.current={bi:nbi,beat:nb,rep:nr};
    }
    timRef.current=setTimeout(sched,25);
  },[]);

  function startPlay(){
    if(!ctxRef.current)ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    if(ctxRef.current.state==="suspended")ctxRef.current.resume();
    posRef.current={bi:0,beat:0,rep:0};nxtRef.current=ctxRef.current.currentTime+0.05;
    if(countIn&&seqRef.current.length>0){inCIRef.current=true;ciBeatRef.current=0;setIsCI(true);setDCIBeat(-1);}
    else inCIRef.current=false;
    playRef.current=true;setPlaying(true);setDBlock(0);setDBeat(-1);setDRep(0);setLiveBpm(null);
    sched();
  }
  function stopPlay(){
    playRef.current=false;setPlaying(false);clearTimeout(timRef.current);
    setDBeat(-1);setFlash(false);setIsCI(false);inCIRef.current=false;ciBeatRef.current=0;setLiveBpm(null);
  }
  function tapTempo(){
    const now=Date.now(),taps=tapRef.current.filter(t=>now-t<3000);
    taps.push(now);tapRef.current=taps.slice(-8);
    if(taps.length>=2){const diffs=taps.slice(1).map((t,i)=>t-taps[i]);const avg=diffs.reduce((a,b)=>a+b)/diffs.length;setBpm(Math.min(300,Math.max(20,Math.round(60000/avg))));}
    setTapFlash(true);setTimeout(()=>setTapFlash(false),120);
  }

  // ── TUNER ──────────────────────────────────────────
  function startTuner(){
    if(!navigator.mediaDevices?.getUserMedia){setTunerErr("マイクAPIが使用できません（HTTPSが必要な場合があります）");return;}
    setTunerErr("");
    navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(stream=>{
      tunerStreamRef.current=stream;
      if(!ctxRef.current)ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      const ctx=ctxRef.current;
      if(ctx.state==="suspended")ctx.resume();
      const src=ctx.createMediaStreamSource(stream);
      const ana=ctx.createAnalyser();
      ana.fftSize=2048;ana.smoothingTimeConstant=0;
      src.connect(ana);tunerAnaRef.current=ana;
      tunerOnRef.current=true;setTunerOn(true);
      let frameN=0;
      const buf=new Float32Array(ana.fftSize);
      function loop(){
        if(!tunerOnRef.current)return;
        tunerAnimRef.current=requestAnimationFrame(loop);
        if(++frameN%4!==0)return; // ~15fps analysis
        ana.getFloatTimeDomainData(buf);
        const freq=autoCorrelate(buf,ctx.sampleRate);
        setTunerNote(freq>0?freqToNote(freq,tunerA4Ref.current):null);
      }
      loop();
    }).catch(err=>{
      setTunerErr(err.name==="NotAllowedError"?"マイクへのアクセスが拒否されました":"マイクにアクセスできませんでした");
    });
  }
  function stopTuner(){
    tunerOnRef.current=false;setTunerOn(false);
    cancelAnimationFrame(tunerAnimRef.current);
    tunerStreamRef.current?.getTracks().forEach(t=>t.stop());
    tunerStreamRef.current=null;tunerAnaRef.current=null;
    setTunerNote(null);
  }
  function toggleTuner(){tunerOn?stopTuner():startTuner();}

  // ── SEQUENCE OPS ───────────────────────────────────
  function addBlock(){
    const n=Math.max(1,parseInt(addNv)||4),d=parseInt(addDv)||4,r=Math.max(1,parseInt(addRv)||1);
    setSeq(s=>[...s,mkBlock(n,d,r,addLabel,addGroups)]);setAddLabel("");setAddGroups("");
  }
  function removeBlock(id){setSeq(s=>s.filter(b=>b.id!==id));}
  function updateBlock(id,field,value){setSeq(s=>s.map(b=>b.id===id?{...b,[field]:value}:b));}
  function moveBlock(id,dir){setSeq(s=>{const idx=s.findIndex(b=>b.id===id),ni=idx+dir;if(ni<0||ni>=s.length)return s;const ns=[...s];[ns[idx],ns[ni]]=[ns[ni],ns[idx]];return ns;});}
  function duplicateBlock(id){setSeq(s=>{const idx=s.findIndex(b=>b.id===id);if(idx<0)return s;const b=s[idx];const cp=mkBlock(b.n,b.d,b.reps,b.label,b.groups,b.tempoMode,b.bpmEnd,b.tempoShape);const ns=[...s];ns.splice(idx+1,0,cp);return ns;});}
  function parseBatch(){
    const parts=batchText.split(/[,;]+/).map(s=>s.trim()).filter(Boolean),blocks=[];
    for(const part of parts){const m=part.match(/^(\d+)\/(\d+)(?:[×x*](\d+))?\s*(.*)$/i);if(m){const n=parseInt(m[1]),d=parseInt(m[2]),r=parseInt(m[3])||1,label=(m[4]||"").trim();if(n>0&&[2,4,8,16,32].includes(d))blocks.push(mkBlock(n,d,r,label,""));}}
    if(blocks.length){setSeq(blocks);setBatchText("");}
  }
  function clearAll(){stopPlay();setSeq([mkBlock(4,4,4,"","")]);setCurrentFile("");}

  // ── LIBRARY OPS ────────────────────────────────────
  async function saveSong(){
    const name=saveName.trim();if(!name){flashMsg("⚠ 名前を入力");return;}
    const totalM=seq.reduce((a,b)=>a+b.reps,0);
    const entry={name,bpm,pct,loop,soundType,subdivide,tunerA4,seq:seqToData(seq),savedAt:new Date().toISOString(),totalMeasures:totalM};
    if(!await stSet(songKey(name),entry)){flashMsg("❌ 保存失敗");return;}
    const newLib=library.filter(e=>e.name!==name).concat({name,bpm,savedAt:entry.savedAt,totalMeasures:totalM}).sort((a,b)=>a.name.localeCompare(b.name));
    await stSet(STORAGE_INDEX,newLib);setLibrary(newLib);setCurrentFile(name);flashMsg(`✓ "${name}" 保存完了`);
  }
  async function loadSong(name){
    const data=await stGet(songKey(name));if(!data){flashMsg("❌ 読み込み失敗");return;}
    stopPlay();setSeq(dataToSeq(data.seq));
    if(data.bpm)setBpm(data.bpm);if(data.pct)setPct(data.pct);
    if(data.loop!==undefined)setLoop(data.loop);if(data.soundType)setSoundType(data.soundType);
    if(data.subdivide!==undefined)setSubdivide(data.subdivide);
    setCurrentFile(name);setSaveName(name);setShowLib(false);flashMsg(`✓ "${name}" 読み込み完了`);
  }
  async function deleteSong(name){
    if(!window.confirm(`"${name}" を削除しますか？`))return;
    await stDel(songKey(name));
    const newLib=library.filter(e=>e.name!==name);
    await stSet(STORAGE_INDEX,newLib);setLibrary(newLib);
    if(currentFile===name)setCurrentFile("");flashMsg(`🗑 "${name}" 削除`);
  }
  function flashMsg(msg){setSaveMsg(msg);setTimeout(()=>setSaveMsg(""),3000);}
  function fmtDate(iso){try{return new Date(iso).toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}catch{return iso;}}

  // ── EXPORT/IMPORT ───────────────────────────────────
  function dlJson(data,filename){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  function exportCurrent(){
    const data={type:"keepbeat-sequence",version:"1.3",name:currentFile||"KEEP-BEAT sequence",bpm,pct,loop,soundType,subdivide,seq:seqToData(seq),exportedAt:new Date().toISOString(),totalMeasures:seq.reduce((a,b)=>a+b.reps,0)};
    dlJson(data,`KEEPBEAT_${(currentFile||"sequence").replace(/[\s\/\\:*?"<>|]/g,"-")}.json`);
    flashMsg("📤 書き出し完了");
  }
  async function exportLibrary(){
    if(!library.length){flashMsg("⚠ ライブラリが空");return;}
    const songs=[];
    for(const e of library){const d=await stGet(songKey(e.name));if(d)songs.push(d);}
    dlJson({type:"keepbeat-library",version:"1.3",songs,exportedAt:new Date().toISOString(),songCount:songs.length},`KEEPBEAT_library_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.json`);
    flashMsg(`📚 ${songs.length}曲 書き出し完了`);
  }
  function handleImportFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.type==="keepbeat-sequence"){
          stopPlay();setSeq(dataToSeq(data.seq));
          if(data.bpm)setBpm(data.bpm);if(data.pct)setPct(data.pct);
          if(data.loop!==undefined)setLoop(data.loop);if(data.soundType)setSoundType(data.soundType);
          if(data.subdivide!==undefined)setSubdivide(data.subdivide);
          const name=data.name||file.name.replace(/\.json$/i,"");
          setCurrentFile(name);setSaveName(name);setShowLib(false);flashMsg(`✓ "${name}" インポート完了`);
        }else if(data.type==="keepbeat-library"){
          if(!data.songs?.length){flashMsg("⚠ 曲が見つかりません");return;}
          let count=0;const newEntries=[];
          for(const song of data.songs){
            if(!song?.seq||!song?.name)continue;
            await stSet(songKey(song.name),song);
            const totalM=song.totalMeasures||song.seq.reduce((a,b)=>a+(b.reps||1),0);
            newEntries.push({name:song.name,bpm:song.bpm,savedAt:song.savedAt||new Date().toISOString(),totalMeasures:totalM});
            count++;
          }
          const merged=[...library.filter(e=>!newEntries.find(n=>n.name===e.name)),...newEntries].sort((a,b)=>a.name.localeCompare(b.name));
          await stSet(STORAGE_INDEX,merged);setLibrary(merged);flashMsg(`✓ ${count}曲 インポート完了`);
        }else{flashMsg("❌ 対応していないファイル形式");}
      }catch{flashMsg("❌ ファイル読み込み失敗");}
    };
    reader.readAsText(file);e.target.value="";
  }

  // ── DERIVED ────────────────────────────────────────
  const curBlk=isCI?(seq[0]||mkBlock()):(seq[Math.min(dBlock,seq.length-1)]||seq[0]||mkBlock());
  const accents=getAccentLevels(curBlk.n,curBlk.groups);
  const activeBeat=isCI?dCIBeat:dBeat;
  let globalMeasure=1;
  for(let i=0;i<Math.min(dBlock,seq.length);i++)globalMeasure+=seq[i]?.reps||0;
  globalMeasure+=dRep;
  const totalMeasures=seq.reduce((a,b)=>a+b.reps,0);
  const dotColor=isCI?T.cyan:T.amber;
  const sigColor=isCI?T.cyan:(playing?T.amber:T.muted);
  const curTempoMode=TEMPO_MODES.find(m=>m.id===curBlk.tempoMode)||TEMPO_MODES[0];

  // Tuner meter
  const tunerCents=tunerNote?.cents??0;
  const mW=280,mH=46;
  const toX=c=>(c+50)/100*mW;
  const needleX=toX(tunerCents);
  const needleColor=Math.abs(tunerCents)<10?T.green:Math.abs(tunerCents)<25?T.amber:T.red;
  const subLabels={0:"OFF",2:"♪÷2 8分",3:"♪÷3 3連",4:"♪÷4 16分"};

  // ══════════════════════════════════════════════════════
  return (
    <div style={{fontFamily:T.mono,background:T.bg,color:T.text,minHeight:"100vh",padding:"12px 14px",WebkitFontSmoothing:"antialiased"}}>

      {/* ── HEADER ── */}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:6}}>
        <div>
          <div style={{fontFamily:T.font,fontSize:22,fontWeight:900,color:T.amber,letterSpacing:4,textShadow:`0 0 24px ${T.amberGlow}`}}>KEEP-BEAT</div>
          <div style={{fontFamily:T.cond,fontSize:10,color:T.muted,letterSpacing:2,marginTop:1}}>
            BRASS BAND VARIABLE METER METRONOME
            {currentFile&&<span style={{color:T.blue,marginLeft:8}}>▶ {currentFile}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {saveMsg&&<span style={{fontFamily:T.cond,fontSize:11,color:T.green}}>{saveMsg}</span>}
          <button onClick={()=>setShowTuner(v=>!v)} style={{...S.btnSm,background:showTuner?"#1a1a2e":T.panel2,color:T.purple,border:`1px solid ${showTuner?T.purple:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:2}}>
            🎵 TUNER{tunerOn&&<span style={{color:T.green,animation:"blink 1s infinite"}}> ●</span>}
          </button>
          <button onClick={()=>setShowLib(l=>!l)} style={{...S.btnSm,background:showLib?"#1a2a35":T.panel2,color:T.blue,border:`1px solid ${showLib?T.blue:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:2}}>
            ☰ LIBRARY{library.length>0&&` (${library.length})`}
          </button>
          <button onClick={()=>setLoop(l=>!l)} style={{...S.btnSm,background:loop?T.amber:"transparent",color:loop?"#000":T.muted,border:`1px solid ${loop?T.amber:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:2}}>
            ⟳ {loop?"LOOP ON":"LOOP OFF"}
          </button>
        </div>
      </div>

      {/* ── TUNER PANEL ── */}
      {showTuner&&(
        <div style={{background:T.panel,border:`1px solid ${T.purple}50`,borderRadius:8,padding:14,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
            <div style={{fontFamily:T.cond,fontSize:11,color:T.purple,letterSpacing:3,fontWeight:700}}>🎵 CHROMATIC TUNER</div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontFamily:T.cond,fontSize:10,color:T.muted}}>A4 基準音:</span>
              {[440,441,442,443,444].map(v=>(
                <button key={v} onClick={()=>setTunerA4(v)} style={{...S.btnSm,background:tunerA4===v?T.purple:T.panel2,color:tunerA4===v?"#fff":T.muted,border:`1px solid ${tunerA4===v?T.purple:T.border}`,fontSize:11,padding:"4px 8px",fontFamily:T.font}}>
                  {v}
                </button>
              ))}
              <button onClick={toggleTuner} style={{...S.btnSm,background:tunerOn?"#2a1a2e":T.panel2,color:tunerOn?T.green:T.muted,border:`1px solid ${tunerOn?T.green:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:1,padding:"5px 12px"}}>
                {tunerOn?"● MIC ON":"○ MIC OFF"}
              </button>
            </div>
          </div>

          {tunerErr&&<div style={{fontFamily:T.cond,fontSize:11,color:T.red,marginBottom:8}}>{tunerErr}</div>}

          <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
            {/* Note display */}
            <div style={{minWidth:80,textAlign:"center"}}>
              <div style={{fontFamily:T.font,fontSize:52,fontWeight:900,color:tunerNote?T.purple:T.muted,lineHeight:1,textShadow:tunerNote?`0 0 20px ${T.purple}50`:"none",transition:"color .1s"}}>
                {tunerNote?tunerNote.name:"—"}
              </div>
              <div style={{fontFamily:T.font,fontSize:18,color:tunerNote?T.muted:"#333",marginTop:-4}}>
                {tunerNote?tunerNote.oct:""}
              </div>
            </div>

            {/* Meter + data */}
            <div style={{flex:1,minWidth:180}}>
              {/* SVG meter */}
              <svg viewBox={`0 0 ${mW} ${mH}`} style={{width:"100%",borderRadius:4,overflow:"visible",display:"block",marginBottom:6}}>
                <defs>
                  <linearGradient id="mgrad" x1="0" x2="1" y1="0" y2="0">
                    <stop offset="0%" stopColor="#4a1010"/>
                    <stop offset="20%" stopColor="#4a3510"/>
                    <stop offset="38%" stopColor="#153520"/>
                    <stop offset="50%" stopColor="#0d4a28"/>
                    <stop offset="62%" stopColor="#153520"/>
                    <stop offset="80%" stopColor="#4a3510"/>
                    <stop offset="100%" stopColor="#4a1010"/>
                  </linearGradient>
                </defs>
                <rect width={mW} height={mH-8} fill="url(#mgrad)" rx="3"/>
                {[-50,-25,-10,0,10,25,50].map(c=>(
                  <g key={c}>
                    <line x1={toX(c)} y1={mH-14} x2={toX(c)} y2={mH-8} stroke="#666" strokeWidth={c===0?2:1}/>
                    <text x={toX(c)} y={mH-2} fill="#555" fontSize="7.5" textAnchor="middle" fontFamily="monospace">{c>0?`+${c}`:c}</text>
                  </g>
                ))}
                {tunerNote&&(
                  <>
                    <line x1={needleX} y1={2} x2={needleX} y2={mH-9} stroke={needleColor} strokeWidth={2.5} strokeLinecap="round"/>
                    <circle cx={needleX} cy={mH-7} r={4.5} fill={needleColor} style={{filter:`drop-shadow(0 0 4px ${needleColor})`}}/>
                  </>
                )}
              </svg>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontFamily:T.font,fontSize:16,color:tunerNote?needleColor:T.muted,fontWeight:700}}>
                  {tunerNote?(tunerCents>0?`+${tunerCents}`:tunerCents)+" ¢":"─ ¢"}
                </div>
                <div style={{fontFamily:T.mono,fontSize:11,color:T.muted}}>
                  {tunerNote?`${tunerNote.freq} Hz`:"─"}
                </div>
                <div style={{fontFamily:T.cond,fontSize:10,color:tunerOn?T.green:T.muted}}>
                  {tunerOn?"● LIVE":"○ MUTED"}
                </div>
              </div>
            </div>
          </div>
          {!tunerOn&&<div style={{fontFamily:T.cond,fontSize:10,color:"#333",marginTop:8}}>※ HTTPS環境またはローカル接続でのみマイクアクセスが可能です</div>}
        </div>
      )}

      {/* ── LIBRARY ── */}
      {showLib&&(
        <div style={{background:T.panel,border:`1px solid ${T.blue}40`,borderRadius:8,padding:14,marginBottom:10}}>
          <div style={{fontFamily:T.cond,fontSize:11,color:T.blue,letterSpacing:3,fontWeight:700,marginBottom:10}}>☰ LIBRARY</div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
            <input value={saveName} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveSong()}
              placeholder="曲名 / セクション名" style={{...S.seqInput,flex:1,minWidth:140,padding:"7px 10px",fontSize:13,border:`1px solid ${T.blue}40`}}/>
            <button onClick={saveSong} style={{background:T.blue,color:"#000",border:"none",borderRadius:4,padding:"7px 16px",fontFamily:T.cond,fontWeight:700,fontSize:13,letterSpacing:1}}>💾 SAVE</button>
          </div>
          {loadingLib?(
            <div style={{color:T.muted,fontFamily:T.cond,fontSize:12,textAlign:"center",padding:12}}>読み込み中…</div>
          ):library.length===0?(
            <div style={{color:T.muted,fontFamily:T.cond,fontSize:12,textAlign:"center",padding:12,border:`1px dashed ${T.border}`,borderRadius:6}}>保存データなし</div>
          ):(
            <div style={{maxHeight:200,overflowY:"auto",marginBottom:10}}>
              {library.map(entry=>(
                <div key={entry.name} className="lib-row" style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:3,background:currentFile===entry.name?"#162030":"#0f0f16",border:`1px solid ${currentFile===entry.name?T.blue+"60":T.border}`,borderRadius:5}}>
                  <div style={{width:5,height:5,borderRadius:"50%",flexShrink:0,background:currentFile===entry.name?T.blue:"#222"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:T.font,fontSize:11,color:currentFile===entry.name?T.blue:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{entry.name}</div>
                    <div style={{fontFamily:T.cond,fontSize:10,color:T.muted,marginTop:1}}>♩={entry.bpm} · {entry.totalMeasures}小節 · {fmtDate(entry.savedAt)}</div>
                  </div>
                  <button onClick={()=>loadSong(entry.name)} style={{...S.btnSm,color:T.blue,border:`1px solid ${T.blue}40`,fontFamily:T.cond,fontWeight:700,fontSize:11,padding:"4px 10px"}}>LOAD</button>
                  <button onClick={()=>deleteSong(entry.name)} style={{...S.btnIcon,color:T.red,border:`1px solid #3a1a1a`,padding:"3px 8px",fontSize:13}}>🗑</button>
                </div>
              ))}
            </div>
          )}
          <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10}}>
            <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:7}}>EXPORT / IMPORT</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <button onClick={exportCurrent} style={{...S.btnSm,color:T.cyan,border:`1px solid ${T.cyan}40`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:1,padding:"6px 10px"}}>📤 現在のシーケンス書き出し</button>
              <button onClick={exportLibrary} style={{...S.btnSm,color:T.cyan,border:`1px solid ${T.cyan}40`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:1,padding:"6px 10px"}}>📚 ライブラリ全体を書き出し</button>
              <button onClick={()=>importFileRef.current&&importFileRef.current.click()} style={{...S.btnSm,color:T.amber,border:`1px solid ${T.amber}40`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:1,padding:"6px 10px"}}>📂 JSONを読み込む</button>
              <input ref={importFileRef} type="file" accept=".json,application/json" onChange={handleImportFile} style={{display:"none"}}/>
            </div>
          </div>
        </div>
      )}

      {/* ── MAIN ROW: Display + Transport ── */}
      <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap"}}>

        {/* BEAT DISPLAY */}
        <div style={{flex:"1 1 250px",minWidth:240,background:T.panel,border:`1px solid ${isCI?T.cyan:(flash?T.amber:T.border)}`,borderRadius:8,padding:14,boxShadow:isCI?`0 0 20px ${T.cyan}25`:(flash?`0 0 20px ${T.amberGlow}`:"none"),transition:"border-color .06s,box-shadow .06s"}}>
          {isCI&&<div style={{fontFamily:T.font,fontSize:9,color:T.cyan,letterSpacing:4,marginBottom:5,animation:"pulse .5s ease-in-out infinite alternate"}}>◆ PRE-COUNT</div>}
          <div style={{fontFamily:T.font,fontWeight:900,lineHeight:1,marginBottom:8,display:"flex",alignItems:"baseline",gap:4}}>
            <span style={{fontSize:56,color:sigColor,textShadow:playing?`0 0 20px ${sigColor}40`:"none",transition:"color .15s"}}>{curBlk.n}</span>
            <span style={{fontSize:24,color:T.muted,paddingBottom:3}}>/</span>
            <span style={{fontSize:36,color:sigColor,opacity:.9}}>{curBlk.d}</span>
            {curBlk.tempoMode!=="fixed"&&<span style={{fontSize:12,color:T.purple,marginLeft:4,fontFamily:T.cond,fontStyle:"italic"}}>{curTempoMode.sym||curTempoMode.label}</span>}
          </div>
          {(curBlk.label||curBlk.groups)&&<div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
            {curBlk.label&&<span style={{fontFamily:T.cond,fontSize:11,color:T.amber,letterSpacing:2}}>{curBlk.label.toUpperCase()}</span>}
            {curBlk.groups&&<span style={{fontFamily:T.mono,fontSize:10,color:T.muted}}>[{curBlk.groups}]</span>}
          </div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {Array.from({length:curBlk.n},(_,i)=>{
              const level=accents[i],isActive=activeBeat===i&&playing;
              const sz=level===2?26:level===1?20:16;
              return <div key={i} style={{width:sz,height:sz,borderRadius:"50%",flexShrink:0,background:isActive?(level===2?dotColor:level===1?dotColor+"cc":"#aaaacc"):(level===2?T.amberDim:"#191923"),border:`1.5px solid ${isActive?dotColor:(level===2?"#3a2610":"#202030")}`,boxShadow:isActive&&level===2?`0 0 10px ${dotColor},0 0 20px ${dotColor}40`:"none",transition:"background .04s,box-shadow .04s"}}/>;
            })}
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
            <span style={{fontFamily:T.font,fontSize:20,color:isCI?T.cyan:(playing?T.amber:T.muted),fontWeight:700}}>
              {isCI?"——":(playing?String(globalMeasure).padStart(2,"0"):"——")}
            </span>
            <span style={{fontFamily:T.cond,fontSize:11,color:T.muted}}>/ {totalMeasures} MEASURES</span>
          </div>
          {playing&&!isCI&&(
            <div style={{fontFamily:T.cond,fontSize:10,color:T.muted}}>
              BEAT {dBeat+1}/{curBlk.n} &nbsp; REP {dRep+1}/{curBlk.reps}
              {liveBpm&&liveBpm!==effBpm&&<span style={{marginLeft:8,color:T.purple}}>♩={liveBpm}</span>}
            </div>
          )}
          {isCI&&<div style={{fontFamily:T.cond,fontSize:10,color:T.cyan}}>BEAT {dCIBeat+1}/{curBlk.n}</div>}
        </div>

        {/* TRANSPORT */}
        <div style={{flex:"1 1 230px",minWidth:210,background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:14,display:"flex",flexDirection:"column",gap:10}}>

          {/* SOUND TYPE */}
          <div>
            <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>SOUND TYPE</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {Object.entries(SOUNDS).map(([id,s])=>(
                <button key={id} onClick={()=>setSoundType(id)} style={{...S.btnSm,background:soundType===id?T.amber:T.panel2,color:soundType===id?"#000":T.muted,border:`1px solid ${soundType===id?T.amber:T.border}`,fontFamily:T.font,fontSize:9,letterSpacing:1,padding:"5px 7px"}}>
                  {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* SUBDIVISION */}
          <div>
            <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>SUBDIVISION（細分化）</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[0,2,3,4].map(v=>(
                <button key={v} onClick={()=>setSubdivide(v)} style={{...S.btnSm,background:subdivide===v?T.green:T.panel2,color:subdivide===v?"#000":T.muted,border:`1px solid ${subdivide===v?T.green:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:10,padding:"5px 8px",letterSpacing:1}}>
                  {subLabels[v]}
                </button>
              ))}
            </div>
            {subdivide>0&&<div style={{fontFamily:T.cond,fontSize:10,color:T.green,marginTop:3}}>拍の間に{subdivide-1}つの細分音を追加</div>}
          </div>

          {/* COUNT-IN */}
          <button onClick={()=>setCountIn(c=>!c)} style={{...S.btnSm,background:countIn?T.cyan+"22":"transparent",color:countIn?T.cyan:T.muted,border:`1px solid ${countIn?T.cyan:T.border}`,fontFamily:T.cond,fontWeight:700,fontSize:11,letterSpacing:2,padding:"7px",width:"100%"}}>
            {countIn?"◆ 予備拍 ON (1小節)":"◇ 予備拍 OFF"}
          </button>

          {/* BPM */}
          <div>
            <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:4}}>BPM (♩ 基準)</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={()=>setBpm(b=>Math.max(20,b-1))} style={{...S.btnSm,minWidth:36,fontSize:16,padding:"4px"}}>−</button>
              <input type="number" value={bpm} min={20} max={300} onChange={e=>setBpm(Math.min(300,Math.max(20,parseInt(e.target.value)||60)))}
                style={{flex:1,background:"#0a0a0e",border:`1px solid ${T.border}`,color:T.amber,borderRadius:4,padding:"5px 0",fontFamily:T.font,fontSize:20,fontWeight:700,textAlign:"center"}}/>
              <button onClick={()=>setBpm(b=>Math.min(300,b+1))} style={{...S.btnSm,minWidth:36,fontSize:16,padding:"4px"}}>+</button>
            </div>
            <input type="range" min={20} max={300} value={bpm} onChange={e=>setBpm(parseInt(e.target.value))} style={{width:"100%",marginTop:5,accentColor:T.amber,height:20}}/>
          </div>

          <button onClick={tapTempo} style={{...S.btnSm,background:tapFlash?T.amber:T.panel2,color:tapFlash?"#000":T.text,fontFamily:T.cond,fontWeight:700,fontSize:13,letterSpacing:3,padding:10,borderRadius:5,border:`1px solid ${tapFlash?T.amber:T.border}`}}>TAP TEMPO</button>

          {/* TEMPO % */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3}}>TEMPO %</span>
              <span style={{fontFamily:T.font,fontSize:11,color:T.amber}}>={effBpm} ♩/min</span>
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
              {[50,60,70,75,80,90,100].map(p=>(
                <button key={p} onClick={()=>setPct(p)} style={{...S.btnSm,background:pct===p?T.amber:T.panel2,color:pct===p?"#000":T.muted,padding:"3px 5px",fontSize:10,border:`1px solid ${pct===p?T.amber:T.border}`,minHeight:28}}>{p}%</button>
              ))}
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <input type="range" min={25} max={200} value={pct} onChange={e=>setPct(parseInt(e.target.value))} style={{flex:1,accentColor:T.amber,height:18}}/>
              <input type="number" value={pct} min={25} max={200} onChange={e=>setPct(Math.min(200,Math.max(25,parseInt(e.target.value)||100)))}
                style={{...S.numInput,width:46,fontSize:12}}/>
              <span style={{fontFamily:T.cond,fontSize:10,color:T.muted}}>%</span>
            </div>
          </div>

          <button onClick={playing?stopPlay:startPlay} style={{background:playing?T.red:T.amber,color:"#000",border:"none",borderRadius:6,padding:"14px 0",fontFamily:T.font,fontWeight:900,fontSize:14,letterSpacing:4,boxShadow:playing?`0 0 20px #e8404060`:`0 0 16px ${T.amberGlow}`,minHeight:50}}>
            {playing?"■ STOP":"▶ PLAY"}
          </button>
        </div>
      </div>

      {/* ── SEQUENCE EDITOR ── */}
      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:14}}>
        <div style={{fontFamily:T.cond,fontSize:10,color:T.muted,letterSpacing:3,fontWeight:600,marginBottom:8}}>
          SEQUENCE <span style={{color:"#333"}}>({seq.length} BLOCKS · {totalMeasures} MEASURES)</span>
        </div>
        <div style={{maxHeight:280,overflowY:"auto",marginBottom:10}}>
          {seq.map((blk,i)=>{
            const isActive=playing&&!isCI&&dBlock===i;
            const tm=TEMPO_MODES.find(m=>m.id===blk.tempoMode)||TEMPO_MODES[0];
            return (
              <div key={blk.id} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 7px",marginBottom:4,background:isActive?"#151f12":"#0f0f14",border:`1px solid ${isActive?T.green:T.border}`,borderRadius:5,overflowX:"auto",flexWrap:"nowrap"}}>
                <div style={{width:5,height:5,borderRadius:"50%",flexShrink:0,background:isActive?T.green:"#1e1e28"}}/>
                <span style={{fontFamily:T.font,fontSize:9,color:"#333",width:12,textAlign:"center",flexShrink:0}}>{i+1}</span>
                {/* N/D */}
                <input type="number" value={blk.n} min={1} max={32} onChange={e=>updateBlock(blk.id,"n",Math.max(1,parseInt(e.target.value)||4))} style={{...S.numInput,width:34}}/>
                <span style={{color:T.muted,fontSize:13,flexShrink:0}}>/</span>
                <select value={blk.d} onChange={e=>updateBlock(blk.id,"d",parseInt(e.target.value))} style={{...S.numInput,width:36,cursor:"pointer",paddingLeft:3,flexShrink:0}}>
                  {[2,4,8,16,32].map(v=><option key={v} value={v}>{v}</option>)}
                </select>
                <span style={{color:T.muted,fontSize:12,flexShrink:0}}>×</span>
                <input type="number" value={blk.reps} min={1} max={999} onChange={e=>updateBlock(blk.id,"reps",Math.max(1,parseInt(e.target.value)||1))} style={{...S.numInput,width:42}}/>
                {/* Groups */}
                <input value={blk.groups} onChange={e=>updateBlock(blk.id,"groups",e.target.value)} placeholder="groups" style={{...S.seqInput,width:76,color:T.muted,fontSize:11,flexShrink:0}}/>
                {/* Label */}
                <input value={blk.label} onChange={e=>updateBlock(blk.id,"label",e.target.value)} placeholder="label" style={{...S.seqInput,width:70,flexShrink:0}}/>
                {/* Tempo mode */}
                <select value={blk.tempoMode||"fixed"} onChange={e=>updateBlock(blk.id,"tempoMode",e.target.value)}
                  style={{...S.seqInput,width:72,color:blk.tempoMode&&blk.tempoMode!=="fixed"?T.purple:T.muted,fontSize:11,cursor:"pointer",flexShrink:0}}>
                  {TEMPO_MODES.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
                {/* Target BPM (show when not fixed/rubato) */}
                {blk.tempoMode&&blk.tempoMode!=="fixed"&&blk.tempoMode!=="rubato"&&(
                  <>
                    <span style={{color:T.purple,fontSize:11,flexShrink:0}}>→</span>
                    <input value={blk.bpmEnd} onChange={e=>updateBlock(blk.id,"bpmEnd",e.target.value)}
                      placeholder="BPM" style={{...S.seqInput,width:46,color:T.purple,fontSize:11,flexShrink:0}}/>
                    <select value={blk.tempoShape||"exp"} onChange={e=>updateBlock(blk.id,"tempoShape",e.target.value)}
                      style={{...S.seqInput,width:42,color:"#888",fontSize:10,cursor:"pointer",flexShrink:0}}>
                      <option value="exp">exp</option>
                      <option value="linear">lin</option>
                    </select>
                  </>
                )}
                <button onClick={()=>moveBlock(blk.id,-1)} disabled={i===0} style={{...S.btnIcon,opacity:i===0?.2:1,padding:"3px 5px",minWidth:22}}>▲</button>
                <button onClick={()=>moveBlock(blk.id,1)} disabled={i===seq.length-1} style={{...S.btnIcon,opacity:i===seq.length-1?.2:1,padding:"3px 5px",minWidth:22}}>▼</button>
                <button onClick={()=>duplicateBlock(blk.id)} style={{...S.btnIcon,padding:"3px 5px",minWidth:22}}>⧉</button>
                <button onClick={()=>removeBlock(blk.id)} style={{...S.btnIcon,color:T.red,padding:"3px 5px",minWidth:22}}>✕</button>
              </div>
            );
          })}
        </div>

        {/* Tempo mode legend */}
        <div style={{marginBottom:10,padding:"6px 10px",background:"#0d0d12",borderRadius:5,border:`1px solid ${T.border}`}}>
          <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>TEMPO CHANGE SYMBOLS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"2px 10px"}}>
            {TEMPO_MODES.filter(m=>m.id!=="fixed").map(m=>(
              <span key={m.id} style={{fontFamily:T.cond,fontSize:10,color:T.muted}}>
                <span style={{color:T.purple,fontStyle:"italic"}}>{m.label}</span> {m.desc}
              </span>
            ))}
          </div>
        </div>

        {/* Quick presets */}
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>QUICK ADD</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {PRESETS.map(p=>(
              <button key={p.label} onClick={()=>setSeq(s=>[...s,mkBlock(p.n,p.d,1,"",p.g)])} style={{background:T.panel2,border:`1px solid ${T.border}`,color:T.amber,borderRadius:4,padding:"5px 9px",fontFamily:T.font,fontSize:11,letterSpacing:1,minHeight:30}}>{p.label}</button>
            ))}
          </div>
        </div>

        {/* Custom add */}
        <div style={{marginBottom:10}}>
          <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>CUSTOM ADD</div>
          <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
            <input value={addNv} onChange={e=>setAddNv(e.target.value)} placeholder="N" style={{...S.numInput,width:36}}/>
            <span style={{color:T.muted}}>/</span>
            <select value={addDv} onChange={e=>setAddDv(e.target.value)} style={{...S.numInput,width:38,cursor:"pointer"}}>
              {[2,4,8,16,32].map(v=><option key={v} value={v}>{v}</option>)}
            </select>
            <span style={{color:T.muted}}>×</span>
            <input value={addRv} onChange={e=>setAddRv(e.target.value)} placeholder="回" style={{...S.numInput,width:42}}/>
            <input value={addGroups} onChange={e=>setAddGroups(e.target.value)} placeholder="groups" style={{...S.seqInput,width:100,color:T.muted,fontSize:11}}/>
            <input value={addLabel} onChange={e=>setAddLabel(e.target.value)} placeholder="ラベル" style={{...S.seqInput,flex:1,minWidth:70}}/>
            <button onClick={addBlock} style={{background:T.amber,color:"#000",border:"none",borderRadius:4,padding:"6px 14px",fontFamily:T.cond,fontWeight:700,fontSize:13,letterSpacing:1,minHeight:32}}>+ ADD</button>
          </div>
        </div>

        {/* Batch */}
        <div>
          <div style={{fontFamily:T.cond,fontSize:9,color:T.muted,letterSpacing:3,marginBottom:5}}>
            BATCH <span style={{color:"#333",fontFamily:T.mono,letterSpacing:0,fontSize:10}}>例: 4/4×8 Intro, 7/8×4 Verse, 13/8×1</span>
          </div>
          <div style={{display:"flex",gap:5}}>
            <input value={batchText} onChange={e=>setBatchText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&parseBatch()}
              placeholder="4/4×8 Intro, 7/8×4 Verse, 13/8×1 Outro" style={{...S.seqInput,flex:1,padding:"7px 10px",fontSize:12}}/>
            <button onClick={parseBatch} style={{...S.btnSm,color:T.amber,border:`1px solid ${T.amber}40`,fontFamily:T.cond,fontWeight:700,fontSize:12,letterSpacing:1}}>PARSE</button>
            <button onClick={clearAll} style={{...S.btnSm,color:T.red,border:`1px solid #3a1a1a`,fontFamily:T.cond,fontWeight:700,fontSize:12,letterSpacing:1}}>CLR</button>
          </div>
        </div>
      </div>

      <div style={{textAlign:"center",marginTop:10,fontFamily:T.cond,fontSize:10,color:"#1e1e2a",letterSpacing:3}}>
        KEEP-BEAT v1.4 · BRASS BAND VARIABLE METER METRONOME
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KeepBeat />);
</script>
</body>
</html>
